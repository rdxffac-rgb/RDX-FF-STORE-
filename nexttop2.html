<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Details | RDX Store</title>
    <style>
        /* --- Page Layout --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* --- Header --- */
        .header {
            width: 100%;
            background-color: #F57C00;
            color: white;
            text-align: center;
            padding: 20px 0;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        /* --- Form Styling --- */
        .form-container {
            width: 90%;
            max-width: 400px;
            padding: 25px 20px;
            background: #fff;
            border-radius: 15px;
            border: 2.5px solid #F57C00;
            box-shadow: 0 10px 30px rgba(245, 124, 0, 0.15);
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            color: #F57C00;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.2);
        }

        /* --- Error Messages --- */
        .error-msg {
            color: #ff0000;
            font-size: 11px;
            font-weight: 600;
            margin-top: 5px;
            display: none;
        }

        /* --- Get Diamond Button --- */
        .submit-btn {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3);
            transition: 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">UID Verification - RDX Store</div>

    <div class="form-container">
        <form id="topupForm">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <div id="nameErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Free Fire UID</label>
                <input type="number" id="uid" placeholder="Enter Player UID">
                <div id="uidErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Confirm UID</label>
                <input type="number" id="cuid" placeholder="Confirm Player UID">
                <div id="matchErr" class="error-msg">UID not match</div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter email address">
                <div id="emailErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>WhatsApp Number</label>
                <input type="number" id="whatsapp" placeholder="Enter WhatsApp number">
                <div id="whatsappErr" class="error-msg">Enter details</div>
            </div>

            <button type="button" onclick="verifyAndGo()" class="submit-btn">Get Diamond</button>
        </form>
    </div>

    <div class="footer-note">© 2026 RDX FF STORE INDIA</div>

    <script>
        function verifyAndGo() {
            const fields = ['name', 'uid', 'email', 'whatsapp'];
            const uidVal = document.getElementById('uid').value;
            const cuidVal = document.getElementById('cuid').value;
            const matchErr = document.getElementById('matchErr');
            let isAllValid = true;

            // 1. Validation Logic
            fields.forEach(id => {
                const inputEl = document.getElementById(id);
                const errorEl = document.getElementById(id + 'Err');
                if (!inputEl.value.trim()) {
                    errorEl.style.display = 'block';
                    isAllValid = false;
                } else {
                    errorEl.style.display = 'none';
                }
            });

            // 2. UID Matching Logic
            if (uidVal && cuidVal) {
                if (uidVal !== cuidVal) {
                    matchErr.innerText = "UID not match";
                    matchErr.style.display = 'block';
                    isAllValid = false;
                } else {
                    matchErr.style.display = 'none';
                }
            } else if (!cuidVal) {
                matchErr.innerText = "Enter details";
                matchErr.style.display = 'block';
                isAllValid = false;
            }

            // 3. Vibration on Failure
            if (!isAllValid) {
                if (navigator.vibrate) {
                    navigator.vibrate(250);
                }
                return;
            }

            // 4. Redirect to NEW Google Drive Link
            window.location.href = "https://drive.google.com/file/d/11pgxHnlYFkW3IfidL3kSVQgv_lhkD41I/view?usp=drivesdk";
        }
    </script>

</body>
</html>
