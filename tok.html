<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Tokens | RDX Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* --- Neon Blue Header --- */
        .header-title {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            text-align: center;
            padding: 20px 0;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            margin-bottom: 30px;
        }

        /* --- Cards Grid --- */
        .grid-container {
            width: 92%;
            max-width: 500px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 50px;
        }

        .token-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            border: 2px solid #00d2ff;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .token-card img {
            width: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px #00d2ff);
        }

        .token-amount {
            font-size: 15px;
            font-weight: bold;
            color: #3a7bd5;
            margin-bottom: 5px;
        }

        .price-text {
            font-size: 20px;
            font-weight: 900;
            color: #333;
            margin-bottom: 12px;
        }

        /* --- Blinking Get Token Button --- */
        .get-btn {
            background-color: #2ecc71; /* Green color */
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 0;
            border-radius: 8px;
            width: 90%;
            text-transform: uppercase;
            animation: buttonBlink 1.5s infinite; /* Blinking effect */
            display: inline-block;
            text-align: center;
        }

        @keyframes buttonBlink {
            0% { background-color: #2ecc71; box-shadow: 0 0 0px #2ecc71; }
            50% { background-color: #27ae60; box-shadow: 0 0 10px #2ecc71; }
            100% { background-color: #2ecc71; box-shadow: 0 0 0px #2ecc71; }
        }

        .get-btn:active {
            transform: scale(0.95);
        }

        .back-home {
            margin-bottom: 40px;
            color: #3a7bd5;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #3a7bd5;
        }
    </style>
</head>
<body>

    <div class="header-title">Evo Universal Tokens</div>

    <div class="grid-container">
        
        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">300 Tokens</div>
            <div class="price-text">₹300</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">550 Tokens</div>
            <div class="price-text">₹500</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">1200 Tokens</div>
            <div class="price-text">₹1000</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">2500 Tokens</div>
            <div class="price-text">₹2000</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">5000 Tokens</div>
            <div class="price-text">₹3800</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

        <div class="token-card">
            <span style="font-size: 40px;">💠</span>
            <div class="token-amount">10,000 Tokens</div>
            <div class="price-text">₹7000</div>
            <a href="tok1.html" class="get-btn">Get Token</a>
        </div>

    </div>

    <a href="index.html" class="back-home">← GO BACK TO HOME</a>

</body>
</html>
