<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Center - RDX</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .payment-box { background: #1a1a1a; max-width: 400px; margin: auto; border-radius: 20px; border: 1px solid #333; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Timer Style */
        .timer-box { background: #ff4b2b; color: white; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        
        .order-info { background: #252525; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .price { color: #00ffcc; font-weight: bold; font-size: 18px; }

        /* QR Code Design */
        .qr-container { background: white; padding: 15px; border-radius: 15px; display: inline-block; position: relative; margin-bottom: 15px; }
        #qr-code img { width: 200px; height: 200px; }
        .qr-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; background: white; padding: 2px; border-radius: 5px; }

        .upi-id { background: #333; padding: 10px; border-radius: 10px; font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .pay-btn { background: #ff4b2b; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none; display: block; }
        .disabled { background: #555 !important; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="payment-box">
        <div class="timer-box">
            Payment expires in: <span id="timer">15:00</span>
        </div>

        <div class="order-info">
            <div class="row"><span>Product:</span> <span>Free Fire Diamonds</span></div>
            <div class="row"><span>Quantity:</span> <span>💎 200 Diamonds</span></div>
            <div class="row"><span>Total Payable:</span> <span class="price">₹100.00</span></div>
        </div>

        <p style="font-size: 12px; color: #888;">Scan QR Code to Pay ₹100</p>
        
        <div class="qr-container">
            <div id="qr-code"></div>
            <img src="https://i.ibb.co/vY8p079/diamond-icon.png" class="qr-logo">
        </div>

        <div class="upi-id">UPI ID: remeshwar6@fam</div>

        <a href="upi://pay?pa=remeshwar6@fam&pn=RDX_STORE&am=100&cu=INR" class="pay-btn" id="pay-button">PAY NOW ₹100</a>
        
        <p style="font-size: 11px; color: #555; margin-top: 15px;">© Garena Online. All rights reserved.</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        // QR Code Generation (Fixed for 100 Rs)
        var upiLink = "upi://pay?pa=remeshwar6@fam&pn=RDX_STORE&am=100&cu=INR";
        new QRCode(document.getElementById("qr-code"), {
            text: upiLink,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // 15 Minute Countdown Timer
        function startTimer(duration, display) {
            var timer = duration, minutes, seconds;
            var countdown = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(countdown);
                    display.textContent = "00:00";
                    document.getElementById("pay-button").classList.add("disabled");
                    document.getElementById("pay-button").innerText = "PAYMENT EXPIRED";
                    document.getElementById("pay-button").href = "#";
                }
            }, 1000);
        }

        window.onload = function () {
            var fifteenMinutes = 60 * 15;
            var display = document.querySelector('#timer');
            startTimer(fifteenMinutes, display);
        };
    </script>
</body>
</html>
