<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX Secure Pay - Premium Checkout</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #00d2ff;
            --success: #4ade80;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .payment-box { 
            background: var(--card); 
            width: 90%;
            max-width: 400px; 
            border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 20px; letter-spacing: 1.5px; color: #fff; }
        .header p { color: #64748b; font-size: 13px; margin: 4px 0 20px; }

        /* Timer Fixed */
        .timer-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            color: #fbbf24;
            font-weight: bold;
        }

        .amount {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 15px;
        }

        /* QR Container - Fixed Visibility */
        .qr-wrapper {
            background: white;
            padding: 15px;
            border-radius: 18px;
            display: inline-block;
            margin-bottom: 15px;
        }
        #qr-code img { 
            display: block !important; 
            width: 180px !important; 
            height: 180px !important; 
        }

        .upi-id-box {
            background: #0f172a;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
            border: 1px solid #334155;
            display: inline-block;
        }

        /* App Icons Fixed */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .app-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-link img {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            margin-bottom: 5px;
            background: white;
            padding: 2px;
        }
        .app-link span { font-size: 10px; color: #94a3b8; }

        .secure-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            color: var(--success);
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <div class="payment-box">
        <div class="header">
            <h2>RDX SECURE PAY</h2>
            <p>Ref ID: RDX-TXN-1029</p>
        </div>

        <div class="timer-box">
            Expires in: <span id="timer">15:00</span>
        </div>

        <div class="amount">₹100.00</div>

        <div class="qr-wrapper">
            <div id="qr-code"></div>
        </div>

        <div style="margin-top: 10px;">
            <div class="upi-id-box">UPI: sunilkumar650@upi</div>
        </div>

        <div style="font-size: 12px; color: #475569; letter-spacing: 1px; margin: 15px 0 10px;">DIRECT PAY VIA</div>

        <div class="apps-grid">
            <a href="upi://pay?pa=sunilkumar650@upi&pn=RDX_STORE&am=100&cu=INR" class="app-link">
                <img src="https://img.icons8.com/color/48/google-pay-india.png" alt="GPay">
                <span>G-Pay</span>
            </a>
            <a href="upi://pay?pa=sunilkumar650@upi&pn=RDX_STORE&am=100&cu=INR" class="app-link">
                <img src="https://img.icons8.com/color/48/phonepe.png" alt="PhonePe">
                <span>PhonePe</span>
            </a>
            <a href="upi://pay?pa=sunilkumar650@upi&pn=RDX_STORE&am=100&cu=INR" class="app-link">
                <img src="https://img.icons8.com/color/48/paytm.png" alt="Paytm">
                <span>Paytm</span>
            </a>
            <a href="upi://pay?pa=sunilkumar650@upi&pn=RDX_STORE&am=100&cu=INR" class="app-link">
                <img src="https://i.ibb.co/p3V6fN1/bhim-icon.png" alt="BHIM">
                <span>BHIM</span>
            </a>
        </div>

        <div class="secure-footer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            100% Secure Transaction
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // QR Code Logic with manual check
        window.onload = function() {
            var upiLink = "upi://pay?pa=sunilkumar650@upi&pn=RDX_STORE&am=100&cu=INR";
            new QRCode(document.getElementById("qr-code"), {
                text: upiLink,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            // Timer Logic
            var duration = 60 * 15;
            var display = document.querySelector('#timer');
            var timer = duration, minutes, seconds;
            
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    timer = 0;
                    display.textContent = "00:00";
                }
            }, 1000);
        };
    </script>
</body>
</html>
