<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - RDX Pay</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #0f172a;
            --card: #1e293b;
        }

        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .payment-box { 
            background: var(--card); 
            width: 100%;
            max-width: 420px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Premium Header */
        .header { margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 22px; letter-spacing: 1px; color: #fff; }
        .header p { color: #94a3b8; font-size: 14px; margin: 5px 0 0; }

        /* Timer Bar */
        .timer-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        #timer { color: #fbbf24; font-weight: 700; font-size: 18px; }

        /* QR Section */
        .qr-section {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }
        #qr-code img { width: 200px; height: 200px; }

        .amount-tag {
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upi-id {
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
            display: inline-block;
            border: 1px solid #334155;
        }

        /* Payment Apps Grid */
        .apps-title {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .payment-apps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .app-item img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            transition: transform 0.2s;
            background: white;
            padding: 2px;
        }
        .app-item:hover img { transform: translateY(-3px); }
        .app-item span { font-size: 10px; color: #94a3b8; }

        /* Footer */
        .footer {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 10px;
        }
        .secure-tag {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #4ade80;
        }

        /* Live Notifications */
        #topup-notif {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 41, 59, 0.9);
            border-left: 4px solid #4ade80;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            display: none;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
