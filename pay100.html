<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Pay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; width: 350px; border: 1px solid #334155; }
        .timer { color: #fbbf24; font-weight: bold; background: #0f172a; padding: 8px; border-radius: 10px; margin-bottom: 15px; }
        .qr-bg { background: white; padding: 15px; border-radius: 15px; display: inline-block; }
        .amount { font-size: 30px; font-weight: bold; color: #00d2ff; margin: 15px 0; }
        .upi-id { font-size: 12px; color: #94a3b8; background: #0f172a; padding: 5px 10px; border-radius: 8px; }
        .apps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .apps img { width: 45px; height: 45px; background: white; border-radius: 10px; padding: 2px; }
        .apps span { font-size: 10px; color: #94a3b8; display: block; margin-top: 5px; }
        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="timer">Expires in: <span id="timer">15:00</span></div>
    <div class="amount">₹100.00</div>
    
    <div class="qr-bg"><div id="qrcode"></div></div>
    
    <p><span class="upi-id">sunilkumar650@upi</span></p>

    <div class="apps">
        <a href="upi://pay?pa=sunilkumar650@upi&am=100&cu=INR"><img src="https://img.icons8.com/color/48/google-pay-india.png"><span>GPay</span></a>
        <a href="upi://pay?pa=sunilkumar650@upi&am=100&cu=INR"><img src="https://img.icons8.com/color/48/phonepe.png"><span>PhonePe</span></a>
        <a href="upi://pay?pa=sunilkumar650@upi&am=100&cu=INR"><img src="https://img.icons8.com/color/48/paytm.png"><span>Paytm</span></a>
        <a href="upi://pay?pa=sunilkumar650@upi&am=100&cu=INR"><img src="https://img.icons8.com/color/48/bhim.png"><span>BHIM</span></a>
    </div>
</div>

<script>
    const upi = "upi://pay?pa=sunilkumar650@upi&pn=RDX&am=100&cu=INR";
    new QRCode(document.getElementById("qrcode"), { text: upi, width: 180, height: 180 });

    let time = 900;
    setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if (time > 0) time--;
    }, 1000);
</script>

</body>
</html>
