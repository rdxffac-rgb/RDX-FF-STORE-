<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Topup | RDX Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
            overflow-x: hidden;
        }

        .header-title {
            width: 100%;
            background-color: #F57C00;
            color: white;
            text-align: center;
            padding: 20px 0;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .grid-container {
            width: 92%;
            max-width: 500px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            padding: 25px 10px;
            text-align: center;
            border: 2px solid #F57C00;
            box-shadow: 0 6px 15px rgba(245, 124, 0, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .diamond-amount {
            font-size: 16px;
            font-weight: bold;
            color: #2ecc71;
            margin-top: 10px;
        }

        .price-text {
            font-size: 22px;
            margin: 10px 0;
            font-weight: 900;
            color: #F57C00;
        }

        .get-btn {
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            padding: 10px 0;
            border-radius: 10px;
            width: 90%;
            text-transform: uppercase;
        }

        .notification-container {
            width: 90%;
            max-width: 400px;
            height: 40px;
            background-color: #f0fff0;
            border: 1px solid #2ecc71;
            border-radius: 25px;
            margin: 20px 0 40px 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notif-track {
            display: flex;
            flex-direction: column;
            transition: transform 0.8s ease-in-out;
        }

        .notif-item {
            height: 40px;
            display: flex;
            align-items: center;
            color: #2ecc71;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
        }

        .back-home {
            margin-bottom: 50px;
            color: #F57C00;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #F57C00;
        }
    </style>
</head>
<body>

    <div class="header-title">RDX Diamond Shop</div>

    <div class="grid-container">
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">200 Diamonds</div>
            <div class="price-text">₹100</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">310 Diamonds</div>
            <div class="price-text">₹120</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">1000 Diamonds</div>
            <div class="price-text">₹349</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">1120 Diamonds</div>
            <div class="price-text">₹400</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">2180 Diamonds</div>
            <div class="price-text">₹800</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
        <div class="card">
            <span style="font-size: 35px;">💎</span>
            <div class="diamond-amount">2800 Diamonds</div>
            <div class="price-text">₹1000</div>
            <a href="nexttop1.html" class="get-btn">Get Diamond</a>
        </div>
    </div>

    <div class="notification-container">
        <div class="notif-track" id="notifTrack"></div>
    </div>

    <a href="index.html" class="back-home">← GO BACK</a>

    <script>
        // Prefix aur Suffix ki badi list
        const prefix = ["Pro", "Killer", "Badboy", "Royal", "Gaming", "Legend", "Boss", "Cobra", "Don", "Master", "Star", "Elite", "Super", "Noob_to", "Shadow", "Thunder", "God", "Tiger", "Alpha", "Gamer"];
        const names = ["Aman", "Rahul", "Sumit", "Vicky", "Raj", "Deepak", "Ankit", "Sameer", "Karan", "Lucky", "Arjun", "Rohan", "Amit", "Sonu", "Monu", "Gaurav", "Sunny", "Kapil", "Bunny", "Umesh", "Nitish", "Ayush", "Sachin", "Vishal", "Vikram"];
        const suffix = ["_yt", "_ff", "_07", "_Gamer", "_YT", "_Gaming", "_King", "_Pro", "_Boy", "_99", "_Official", "_FF", "_Live", "_Squad"];
        const amounts = ["200", "310", "1000", "1120", "2180", "2800"];

        const track = document.getElementById('notifTrack');

        function generateSyncedName(index) {
            // Seed based logic taaki sabke phone pe same bane
            const p = prefix[index % prefix.length];
            const n = names[(index * 7) % names.length];
            const s = suffix[(index * 3) % suffix.length];
            
            // Indian names pattern: Pro_Rahul_ff, Killer_Aman_Gamer etc.
            return `${p}_${n}${s}`;
        }

        function getGlobalSyncIndex() {
            return Math.floor(Date.now() / 6500); // 6.5 sec delay
        }

        function createNotifItem(index) {
            const syncName = generateSyncedName(index);
            const amount = amounts[(index * 13) % amounts.length];
            
            const div = document.createElement('div');
            div.className = 'notif-item';
            div.innerHTML = `✅ ${syncName} top up ${amount} diamonds 💎`;
            return div;
        }

        let currentIndex = getGlobalSyncIndex();
        track.appendChild(createNotifItem(currentIndex));

        function syncNotification() {
            const newIndex = getGlobalSyncIndex();
            if (newIndex !== currentIndex) {
                currentIndex = newIndex;
                const newItem = createNotifItem(currentIndex);
                track.appendChild(newItem);

                track.style.transform = 'translateY(-40px)';
                setTimeout(() => {
                    track.style.transition = 'none';
                    track.removeChild(track.firstElementChild);
                    track.style.transform = 'translateY(0)';
                    setTimeout(() => {
                        track.style.transition = 'transform 0.8s ease-in-out';
                    }, 50);
                }, 800);
            }
        }

        setInterval(syncNotification, 1000);
    </script>
</body>
            </html>
