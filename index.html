<!DOCTYPE html>

<head>

    <style>
        /* --- Poori Website ki Setting --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #F57C00; /* Orange Background */
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        /* --- 1. YouTube Video Section (Banner ki jagah) --- */
        .video-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            aspect-ratio: 16/9;
            background-color: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .video-container iframe, .video-container .thumbnail-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .thumbnail-overlay {
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        /* Custom Play Button */
        .play-button {
            width: 70px;
            height: 70px;
            background: rgba(255, 0, 0, 0.9);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .play-button::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent white;
        }
        .thumbnail-overlay:hover .play-button {
            transform: scale(1.1);
        }

        /* --- 2. Auto Slider (2.0s per slide) --- */
        .slider-container {
            width: 94%;
            max-width: 470px;
            margin: 25px 0;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .slider-track {
            display: flex;
            width: 500%; 
            animation: autoSwipe 10s infinite ease-in-out;
        }
        .slider-track img {
            width: 20%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        @keyframes autoSwipe {
            0%, 15% { transform: translateX(0%); }
            20%, 35% { transform: translateX(-20%); }
            40%, 55% { transform: translateX(-40%); }
            60%, 75% { transform: translateX(-60%); }
            80%, 95% { transform: translateX(-80%); }
            100% { transform: translateX(0%); }
        }

        /* --- 3. Premium Diamond Buttons --- */
        .button-section {
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }
        .diamond-btn {
            position: relative;
            background: linear-gradient(145deg, #1e1e1e, #0a0a0a);
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #333;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .diamond-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shineEffect 3.5s infinite linear;
        }
        @keyframes shineEffect {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .diamond-btn:active {
            transform: scale(0.96);
            background: #222;
        }

        /* --- 4. Official Footer --- */
        footer {
            width: 100%;
            background-color: #0c0c0c;
            color: #888;
            padding: 45px 0 25px 0;
            text-align: center;
            font-size: 12px;
            border-top: 3px solid #1a1a1a;
        }
        .footer-content {
            width: 85%;
            max-width: 450px;
            margin: 0 auto;
        }
        .footer-brand {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        .powered-by {
            color: #F57C00;
            font-weight: 800;
            margin: 15px 0;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .trust-badge {
            margin-top: 10px;
            padding: 4px 10px;
            background: #1a1a1a;
            border-radius: 5px;
            color: #2ecc71;
            font-weight: bold;
            display: inline-block;
            border: 1px solid #333;
        }
    </style>
</head>
