<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX FF Store | Premium Diamond Shop</title>
    <style>
        /* --- Global Styles --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #F57C00; /* Signature Orange */
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            /* Header ki wajah se upar se 70px ka gap diya hai */
            padding-top: 70px; 
        }

        /* --- 1. Top Fixed Banner (Purely Fixed) --- */
        .header-fixed {
            width: 100%;
            max-width: 500px;
            position: fixed; /* Sticky se Fixed kar diya hai */
            top: 0;
            left: 50%;
            transform: translateX(-50%); /* Center mein rakhne ke liye */
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-fixed img {
            width: 100%;
            display: block;
        }

        /* --- 2. Auto-Sliding Carousel --- */
        .slider-container {
            width: 92%;
            max-width: 460px;
            margin: 20px 0;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .slider-wrapper {
            display: flex;
            width: 500%; /* 5 images */
            animation: leftSwipe 10s infinite; 
        }
        .slider-wrapper img {
            width: 20%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        @keyframes leftSwipe {
            0% { transform: translateX(0%); }
            20% { transform: translateX(-20%); }
            40% { transform: translateX(-40%); }
            60% { transform: translateX(-60%); }
            80% { transform: translateX(-80%); }
            100% { transform: translateX(0%); }
        }

        /* --- 3. Premium Diamond Buttons --- */
        .button-area {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 10px;
            margin-bottom: 50px;
        }
        .diamond-btn {
            position: relative;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 50%, #111 100%);
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid #444;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        
        /* Shine Animation */
        .diamond-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: btnShine 3s infinite;
        }
        @keyframes btnShine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .diamond-btn:active {
            transform: scale(0.96);
            border-color: #fff;
        }

        /* --- 4. Advanced Footer --- */
        footer {
            width: 100%;
            background-color: #121212;
            color: #999;
            padding: 40px 0 20px 0;
            text-align: center;
            font-size: 12px;
            border-top: 4px solid #222;
        }
        .footer-wrap {
            width: 85%;
            max-width: 450px;
            margin: 0 auto;
        }
        .footer-brand {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        .powered {
            color: #F57C00;
            font-weight: bold;
            margin: 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .legal-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #222;
            line-height: 1.8;
        }
        .trust-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            background: #222;
            border-radius: 4px;
            color: #00ff00;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="header-fixed">
        <img src="image1.jpg" alt="RDX Store Banner">
    </div>

    <div class="slider-container">
        <div class="slider-wrapper">
            <img src="next1.jpg" alt="Slide 1">
            <img src="next2.jpg" alt="Slide 2">
            <img src="next3.jpg" alt="Slide 3">
            <img src="next4.jpg" alt="Slide 4">
            <img src="next5.jpg" alt="Slide 5">
        </div>
    </div>

    <div class="button-area">
        <a href="#" class="diamond-btn">💎 Diamond Topup</a>
        <a href="#" class="diamond-btn">🎫 Elite Membership</a>
        <a href="#" class="diamond-btn">🔥 Universal Tokens</a>
    </div>

    <footer>
        <div class="footer-wrap">
            <span class="footer-brand">RDX FF STORE</span>
            <p>The Most Reliable Digital Asset Store for Gamers.</p>
            
            <div class="powered">
                POWERED BY - CODA SHOP INDIA
            </div>

            <div class="legal-box">
                <p>Govt. Registration: 2026/IND/FF/88012<br>
                GST Verified: 27AAAAA0000A1Z5</p>
                <div class="trust-badge">✓ SECURED BY SSL ENCRYPTION</div>
                <p style="margin-top: 15px;">© 2026 RDX FF STORE INDIA. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

</body>
</html>
